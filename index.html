<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع محمد الأمين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; }
        .header { background: linear-gradient(135deg, #333, #000); padding: 40px; border-bottom: 4px solid #d4af37; }
        h1 { color: #d4af37; font-size: 2.5em; }
        .btn { 
            background-color: #d4af37; border: none; color: black; padding: 12px 24px; 
            font-size: 18px; cursor: pointer; border-radius: 30px; margin: 10px; transition: 0.3s;
            text-decoration: none; display: inline-block;
        }
        .btn:hover { background-color: white; transform: scale(1.1); }
        .card { background: #262626; margin: 20px auto; padding: 30px; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        i { margin-left: 10px; } /* مسافة للأيقونة */
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-music"></i> موسوعة محمد الأمين</h1>
    </div>

    <div class="card">
        <h2>أغنية: وعد النوار</h2>
        <p>استمتع بكلمات وألحان الموسيقار</p>
        
        <a href="#" class="btn"><i class="fas fa-book-open"></i> قراءة الكلمات</a>
        <button class="btn" onclick="alert('سيتم تفعيل المشغل قريباً!')"><i class="fas fa-play"></i> استماع</button>
    </div>

</body>
</html>
