<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موسوعة محمد الأمين</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.song{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

.lyrics{
display:none;
margin-top:15px;
line-height:1.9;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<header>
<h1>موسوعة محمد الأمين</h1>
<p>كلمات وأعمال الموسيقار السوداني</p>
</header>

<div class="container">

<div class="song">

<h2>وعد النوار</h2>

<button onclick="showLyrics()">عرض الكلمات</button>

<div class="lyrics" id="lyrics">

<p>
ضع هنا كلمات الأغنية  
يمكنك إضافة النص كاملاً هنا
</p>

</div>

</div>

</div>

<footer>
© موقع غير رسمي لمحبي محمد الأمين
</footer>

<script>
function showLyrics(){
var x = document.getElementById("lyrics");
if(x.style.display === "none"){
x.style.display = "block";
}else{
x.style.display = "none";
}
}
</script>

</body>
</html>
