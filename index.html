<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مدونة توثق أغاني وكلمات القامة السودانية محمد الأمين">
    <title>أغاني محمد الأمين</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <h1><i class="fas fa-music"></i> أغاني محمد الأمين</h1>
            <button id="theme-toggle" aria-label="تبديل المظهر">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="ابحث باسم الأغنية أو بكلمات منها...">
        </div>

        <div id="songs-container">
            <div class="loading">جاري تحميل الأغاني...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
