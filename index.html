<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلمات أغاني محمد الأمين</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; }
        .dark-mode { background-color: #1a1a1a; color: #ffffff; }
        .song-card { cursor: pointer; transition: 0.3s; border-radius: 15px; border: none; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .song-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        #song-lyrics { white-space: pre-line; line-height: 2; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-success shadow-sm mb-4">
        <div class="container justify-content-between">
            <span class="navbar-brand mb-0 h1">أغاني محمد الأمين</span>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm">تبديل المظهر</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="list-view">
            <input type="text" id="search-input" class="form-control form-control-lg mb-4 shadow-sm" placeholder="ابحث عن أغنية...">
            <div id="songs-grid" class="row g-3">
                </div>
            <div id="no-results" class="hidden text-center mt-5 text-muted">لا توجد نتائج..</div>
        </div>

        <div id="lyrics-view" class="hidden">
            <button id="back-btn" class="btn btn-outline-success mb-4">← عودة للقائمة</button>
            <div class="card shadow-lg p-4 p-md-5">
                <h2 id="song-title" class="text-center border-bottom pb-3 mb-4 text-success"></h2>
                <div id="song-lyrics" class="text-center"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
