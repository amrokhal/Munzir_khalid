<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختارات الباشكاتب | محمد الأمين</title>
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>مُختارات الباشكاتب</h1>
            <p class="subtitle">روائع الموسيقار محمد الأمين</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="ابحث عن أغنية..." autocomplete="off">
            </div>
        </div>
    </header>

    <main>
        <div id="songs-list" class="song-container">
            <div class="loading-spinner">جاري التحميل...</div>
        </div>
    </main>

    <footer class="footer">
        <p>جميع الحقوق محفوظة &copy; 2026</p>
    </footer>

    <!-- Modal for Lyrics -->
    <div id="lyrics-modal" class="modal" aria-hidden="true">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()" aria-label="إغلاق">&times;</button>
            <div class="modal-header">
                <h2 id="current-title"></h2>
                <div class="divider"></div>
            </div>
            <div id="current-lyrics" class="lyrics-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
